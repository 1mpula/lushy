<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lushy - Coming Soon</title>
    <meta name="description"
        content="Lushy is coming soon. The ultimate beauty booking experience. Get ready to book your best look.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Background Elements -->
    <div class="bg-gradient"></div>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    <div class="noise-overlay"></div>

    <!-- Main Container -->
    <main class="main-container">

        <!-- Logo Area -->
        <div class="logo-container animate-fade-in-down">
            <div class="logo-wrapper">
                <img src="lushy-logo.png" alt="Lushy" class="logo-img">
                <div class="logo-glow"></div>
            </div>
        </div>

        <!-- Content Card -->
        <div class="glass-card animate-fade-in-up delay-1">
            <div class="card-content">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span class="status-text">Coming Soon</span>
                </div>

                <h1 class="hero-title">
                    Beauty, <br>
                    <span class="gradient-text">Reimagined.</span>
                </h1>

                <p class="hero-subtitle">
                    We're building the ultimate experience for discovering and booking top stylists.
                    Hair, nails, lashes, and makeup — elevated.
                </p>

                <!-- Email Form -->
                <form class="notify-form" id="notifyForm">
                    <div class="input-group">
                        <input type="email" placeholder="Enter your email" required aria-label="Email address">
                        <button type="submit" class="btn btn-primary">
                            <span>Notify Me</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <p class="form-note">Be the first to know when we launch.</p>
                </form>

                <!-- Social Links -->
                <div class="social-links">
                    <a href="#" class="social-link" aria-label="Instagram">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                        </svg>
                    </a>
                    <a href="#" class="social-link" aria-label="TikTok">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
                        </svg>
                    </a>
                    <a href="#" class="social-link" aria-label="Twitter">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z">
                            </path>
                        </svg>
                    </a>
                </div>
            </div>
        </div>

        <!-- Dynamic Elements -->
        <div class="floating-elements">
            <div class="float-item item-1 animate-float delay-1">
                <span class="emoji">✨</span>
            </div>
            <div class="float-item item-2 animate-float delay-2">
                <span class="emoji">💅</span>
            </div>
            <div class="float-item item-3 animate-float delay-3">
                <span class="emoji">💇‍♀️</span>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
